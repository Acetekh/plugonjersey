<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Received | PLUG.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0B0C0E;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white px-4">
    <div class="max-w-md w-full text-center space-y-8 bg-transparent border border-[#202226] p-8 md:p-10 rounded-lg relative overflow-hidden">
        
        <!-- Accent Glow Effect -->
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-blue-500/10 rounded-full blur-3xl pointer-events-none"></div>
        
        <!-- Premium Minimal Checkmark Wrapper -->
        <div class="mx-auto w-16 h-16 bg-[#111214] border border-[#202226] rounded-full flex items-center justify-center text-blue-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
        </div>

        <div class="space-y-3">
            <span class="text-[9px] md:text-[10px] font-black tracking-[0.3em] text-blue-500 uppercase block">
                Transmission Successful
            </span>
            <h1 class="text-3xl font-black uppercase tracking-tight leading-none text-white">
                Message Received
            </h1>
            <p class="text-[#6C737F] text-xs font-medium leading-relaxed pt-2">
               Submission Received. Thank you for reaching out. We are processing your request and will get back to you via email within the next 24 hours.
            </p>
        </div>

        <!-- Return CTA Button -->
        <div class="pt-4">
            <a href="about.html" 
               class="inline-flex items-center justify-center w-full h-[48px] border border-[#202226] hover:bg-white hover:text-black hover:border-white text-[#9AA3AE] font-black uppercase tracking-widest text-[11px] transition-all duration-200 bg-transparent rounded-md cursor-pointer">
                Return to Pitch
            </a>
        </div>
    </div>
</body>
</html>
